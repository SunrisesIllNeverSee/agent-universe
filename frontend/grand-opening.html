<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C4923A;
    --gold-light: #E8C07A;
    --gold-dim: #8A6328;
    --ink: #0E0C09;
    --parchment: #F7F3EC;
    --parchment-dark: #EDE6D8;
    --ash: #6B6456;
    --border: rgba(196,146,58,0.25);
    --border-strong: rgba(196,146,58,0.55);
  }

  /* HEADER */
  header { padding: 5rem 0 3rem; text-align: center; position: relative; }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px; font-weight: 400;
    letter-spacing: .3em; color: var(--gold);
    text-transform: uppercase; margin-bottom: 1.5rem;
    animation: fadeUp .8s ease both;
  }

  h1 {
    font-size: clamp(3rem, 8vw, 5.5rem);
    font-weight: 300; line-height: 1.05;
    letter-spacing: -.01em; margin-bottom: .5rem;
    animation: fadeUp .8s .1s ease both;
  }
  h1 em { font-style: italic; color: var(--gold-light); }

  .sub-title {
    font-size: clamp(1rem, 2.5vw, 1.35rem);
    font-weight: 300; color: var(--ash);
    margin-bottom: 2rem; animation: fadeUp .8s .2s ease both;
  }

  .gold-rule {
    width: 60px; height: 1px; background: var(--gold);
    margin: 0 auto 2rem; opacity: .5;
    animation: fadeUp .8s .3s ease both;
  }

  .header-copy {
    font-size: 1.15rem; font-weight: 300;
    color: rgba(247,243,236,0.7); line-height: 1.8;
    max-width: 600px; margin: 0 auto;
    font-style: italic; animation: fadeUp .8s .4s ease both;
  }

  /* COUNTDOWN */
  .countdown-wrap { padding: 3rem 0; text-align: center; animation: fadeUp .8s .5s ease both; }
  .countdown-label {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: .25em; color: var(--gold-dim);
    text-transform: uppercase; margin-bottom: 1rem;
  }
  .countdown { display: flex; gap: 1.5rem; justify-content: center; align-items: flex-end; }
  .cd-unit { text-align: center; }
  .cd-num {
    font-family: 'DM Mono', monospace;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 300; color: var(--gold-light);
    line-height: 1; display: block;
  }
  .cd-lbl {
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: .2em; color: var(--ash);
    text-transform: uppercase; display: block; margin-top: 4px;
  }
  .cd-sep {
    font-family: 'DM Mono', monospace; font-size: 2rem;
    color: var(--gold-dim); padding-bottom: .25rem; opacity: .5;
  }

  /* SECTION LABELS */
  .section-label {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: .3em; color: var(--gold);
    text-transform: uppercase; margin-bottom: 2rem; padding-top: 3rem;
  }

  /* PHASES */
  .phases {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--border);
    border: 1px solid var(--border); border-radius: 2px;
    overflow: hidden; margin-bottom: 4rem;
    animation: fadeUp .8s .5s ease both;
  }
  .phase {
    background: var(--ink); padding: 2rem 1.5rem;
    position: relative; transition: background .2s;
  }
  .phase:hover { background: rgba(196,146,58,0.04); }
  .phase.active { background: rgba(196,146,58,0.06); }
  .phase.active::after {
    content: 'ACTIVE'; position: absolute; top: 1rem; right: 1rem;
    font-family: 'DM Mono', monospace; font-size: 8px;
    letter-spacing: .2em; color: var(--gold);
    border: 1px solid var(--border-strong);
    padding: 2px 6px; border-radius: 2px;
  }
  .phase-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gold-dim); letter-spacing: .2em; margin-bottom: .75rem; }
  .phase-name { font-size: 1.4rem; font-weight: 300; margin-bottom: .25rem; color: var(--parchment); }
  .phase-window { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ash); margin-bottom: 1.25rem; letter-spacing: .05em; }
