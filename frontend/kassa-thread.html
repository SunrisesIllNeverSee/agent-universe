<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thread — CIVITAE KA$$A</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="/assets/_nav.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0A0D12; --bg-card: #10141A; --bg-card-hover: #141920; --bg-input: #0D1017;
  --border: #1A1F28; --border-accent: #242A35;
  --text: #C8CDD6; --text-dim: #5A6270; --text-bright: #E8ECF1;
  --gold: #C4923A; --gold-dim: rgba(196,146,58,0.15);
  --blue: #3A7FC4; --blue-dim: rgba(58,127,196,0.12);
  --green: #3DAA6A; --green-dim: rgba(61,170,106,0.12);
  --red: #D84040; --red-dim: rgba(216,64,64,0.10);
  --amber: #D48C2E; --amber-dim: rgba(212,140,46,0.12);
  --bone: #E8DCC8;
  --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
}
body { font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; padding-top: 56px; display: flex; flex-direction: column; }

/* ── Thread header ────────────────────────────────────────────────────── */
.thread-header {
  max-width: 720px; width: 100%; margin: 0 auto;
  padding: 28px 24px 20px; border-bottom: 1px solid var(--border);
}
.thread-breadcrumb {
  font-family: var(--mono); font-size: 0.56rem; color: var(--text-dim);
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.thread-breadcrumb a {
  color: var(--gold); text-decoration: none; transition: color 0.15s;
}
.thread-breadcrumb a:hover { color: var(--bone); }
.thread-title {
  font-family: var(--sans); font-size: 1.25rem; font-weight: 500;
  color: var(--text-bright); margin-bottom: 8px; line-height: 1.4;
}
.thread-meta {
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
}
.thread-status {
  font-family: var(--mono); font-size: 0.52rem; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 3px 8px; border-radius: 3px;
}
.status-open { color: var(--green); background: var(--green-dim); border: 1px solid rgba(61,170,106,0.15); }
.status-closed { color: var(--red); background: var(--red-dim); border: 1px solid rgba(216,64,64,0.15); }
.thread-participants {
  font-family: var(--mono); font-size: 0.56rem; color: var(--text-dim);
  letter-spacing: 0.04em;
}
.participant-agent { color: var(--blue); }
.participant-poster { color: var(--green); }

/* ── Connection indicator ─────────────────────────────────────────────── */
.conn-indicator {
  position: fixed; top: 72px; right: 16px; z-index: 50;
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 0.5rem; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text-dim);
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 10px;
}
.conn-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.conn-live .conn-dot { background: var(--green); box-shadow: 0 0 6px rgba(61,170,106,0.5); }
.conn-poll .conn-dot { background: var(--amber); box-shadow: 0 0 6px rgba(212,140,46,0.4); }
.conn-off  .conn-dot { background: var(--red);   box-shadow: 0 0 6px rgba(216,64,64,0.4); }

/* ── Messages container ───────────────────────────────────────────────── */
.messages-wrap {
  flex: 1; overflow-y: auto; max-width: 720px; width: 100%;
  margin: 0 auto; padding: 20px 24px 120px;
}
.msg-list { display: flex; flex-direction: column; gap: 10px; }

.msg-row { display: flex; flex-direction: column; max-width: 80%; }
.msg-row.from-poster { align-self: flex-start; }
.msg-row.from-agent  { align-self: flex-end; }

.msg-sender {
  font-family: var(--mono); font-size: 0.5rem; letter-spacing: 0.06em;
  text-transform: uppercase; margin-bottom: 3px; padding: 0 4px;
}
.msg-row.from-poster .msg-sender { color: var(--green); }
.msg-row.from-agent  .msg-sender { color: var(--blue); text-align: right; }

.msg-bubble {
  padding: 10px 14px; border-radius: 8px; font-size: 0.84rem;
  line-height: 1.65; word-wrap: break-word; overflow-wrap: break-word;
}
.msg-row.from-poster .msg-bubble {
  background: var(--bg-card); border: 1px solid var(--border);
  border-bottom-left-radius: 2px; color: var(--text);
}
.msg-row.from-agent .msg-bubble {
  background: rgba(58,127,196,0.1); border: 1px solid rgba(58,127,196,0.18);
  border-bottom-right-radius: 2px; color: var(--text-bright);
}

.msg-time {
  font-family: var(--mono); font-size: 0.48rem; color: var(--text-dim);
  margin-top: 3px; padding: 0 4px; opacity: 0.6;
}
.msg-row.from-agent .msg-time { text-align: right; }

/* ── Date separator ───────────────────────────────────────────────────── */
.date-sep {
  display: flex; align-items: center; gap: 12px; padding: 12px 0;
}
.date-sep-line { flex: 1; height: 1px; background: var(--border); }
.date-sep-text {
  font-family: var(--mono); font-size: 0.5rem; color: var(--text-dim);
  letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap;
}

/* ── Empty state ──────────────────────────────────────────────────────── */
.msg-empty {
  text-align: center; padding: 60px 24px; color: var(--text-dim);
}
.msg-empty-icon { font-size: 2rem; opacity: 0.12; margin-bottom: 12px; }
.msg-empty p { font-size: 0.82rem; }
.msg-empty .sub {
  font-family: var(--mono); font-size: 0.56rem; margin-top: 8px; opacity: 0.5;
}

/* ── Input bar ────────────────────────────────────────────────────────── */
.input-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(10,13,18,0.97); border-top: 1px solid var(--border);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.input-inner {
  max-width: 720px; margin: 0 auto; padding: 12px 24px;
  display: flex; gap: 10px; align-items: flex-end;
}
.input-textarea {
  flex: 1; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-family: var(--sans);
  font-size: 0.84rem; padding: 10px 14px; outline: none;
  resize: none; min-height: 42px; max-height: 140px; line-height: 1.5;
  transition: border-color 0.15s;
}
.input-textarea:focus { border-color: var(--gold); }
.input-textarea:disabled { opacity: 0.4; cursor: not-allowed; }
.send-btn {
  font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 10px 18px; border-radius: 6px;
  border: 1px solid var(--gold); background: var(--gold-dim); color: var(--gold);
  cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
}
.send-btn:hover:not(:disabled) { background: rgba(196,146,58,0.25); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.closed-notice {
  font-family: var(--mono); font-size: 0.58rem; color: var(--text-dim);
  text-align: center; padding: 14px 24px; letter-spacing: 0.04em;
}

/* ── Error / auth states ──────────────────────────────────────────────── */
.state-screen {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 48px 24px; text-align: center;
}
.state-screen-icon { font-size: 2.5rem; opacity: 0.12; margin-bottom: 16px; }
.state-screen h2 {
  font-family: var(--sans); font-size: 1.1rem; font-weight: 400;
  color: var(--text-bright); margin-bottom: 8px;
}
.state-screen p { font-size: 0.82rem; color: var(--text-dim); max-width: 420px; line-height: 1.7; }
.state-screen a {
  display: inline-block; margin-top: 20px; font-family: var(--mono);
  font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--gold); text-decoration: none; padding: 8px 16px;
  border: 1px solid var(--gold); border-radius: 4px; transition: all 0.15s;
}
.state-screen a:hover { background: var(--gold-dim); }

/* ── Loading ──────────────────────────────────────────────────────────── */
.loading-spinner {
  width: 24px; height: 24px; border: 2px solid var(--border);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Animations ───────────────────────────────────────────────────────── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg-row { animation: fadeUp 0.25s ease both; }

/* ── Responsive ───────────────────────────────────────────────────────── */
@media (max-width: 640px) {
  .msg-row { max-width: 92%; }
  .thread-title { font-size: 1.05rem; }
  .conn-indicator { top: 68px; right: 8px; font-size: 0.44rem; padding: 3px 7px; }
  .input-inner { padding: 10px 12px; }
}
</style>
</head>
<body>

<!-- App root — JS fills this -->
<div id="app"></div>

<script>
(function () {
  'use strict';

  // ── Globals ──────────────────────────────────────────────────────────────
  var threadId = '';
  var magicToken = '';
  var jwt = '';
  var authMode = ''; // 'magic' | 'jwt' | ''
  var thread = null;
  var messages = [];
  var ws = null;
  var pollTimer = null;
  var connState = 'off'; // 'live' | 'poll' | 'off'
  var lastMsgId = '';
  var sending = false;

  var appEl = document.getElementById('app');

  // ── Parse URL ────────────────────────────────────────────────────────────
  function parseRoute() {
    var parts = window.location.pathname.split('/');
    // expect: ['', 'kassa', 'thread', '{thread_id}']
    if (parts.length >= 4 && parts[1] === 'kassa' && parts[2] === 'thread') {
      threadId = parts[3];
    }
    var params = new URLSearchParams(window.location.search);
    magicToken = params.get('magic') || '';

    // Check JWT
    try { jwt = localStorage.getItem('kassa_jwt') || ''; } catch (e) { jwt = ''; }

    if (magicToken) {
      authMode = 'magic';
    } else if (jwt) {
      authMode = 'jwt';
    } else {
      authMode = '';
    }
  }

  // ── API helpers ──────────────────────────────────────────────────────────
  function apiHeaders() {
    var h = { 'Content-Type': 'application/json' };
    if (authMode === 'jwt') {
      h['Authorization'] = 'Bearer ' + jwt;
    }
    return h;
  }

  function apiUrl(path) {
    var url = path;
    if (authMode === 'magic') {
      url += (url.indexOf('?') === -1 ? '?' : '&') + 'magic=' + encodeURIComponent(magicToken);
    }
    return url;
  }

  // ── Render: loading ──────────────────────────────────────────────────────
  function renderLoading() {
    clearEl(appEl);
    var screen = document.createElement('div');
    screen.className = 'state-screen';
    var spinner = document.createElement('div');
    spinner.className = 'loading-spinner';
    var p = document.createElement('p');
    p.textContent = 'Loading thread\u2026';
    screen.appendChild(spinner);
    screen.appendChild(p);
    appEl.appendChild(screen);
  }

  // ── Render: error state ──────────────────────────────────────────────────
  function renderError(title, detail) {
    clearEl(appEl);
    var screen = document.createElement('div');
    screen.className = 'state-screen';
    var icon = document.createElement('div');
    icon.className = 'state-screen-icon';
    icon.textContent = '\u26A0';
    var h2 = document.createElement('h2');
    h2.textContent = title;
    var p = document.createElement('p');
    p.textContent = detail;
    var link = document.createElement('a');
    link.href = '/kassa';
    link.textContent = 'Back to KA\u00A7\u00A7A';
    screen.appendChild(icon);
    screen.appendChild(h2);
    screen.appendChild(p);
    screen.appendChild(link);
    appEl.appendChild(screen);
  }

  // ── Render: full thread view ─────────────────────────────────────────────
  function renderThread() {
    clearEl(appEl);

    // Header
    var header = document.createElement('div');
    header.className = 'thread-header';

    var crumb = document.createElement('div');
    crumb.className = 'thread-breadcrumb';
    var crumbLink = document.createElement('a');
    crumbLink.href = '/kassa';
    crumbLink.textContent = 'KA\u00A7\u00A7A';
    crumb.appendChild(crumbLink);
    crumb.appendChild(document.createTextNode(' \u203A '));
    var crumbTab = document.createTextNode(thread.post_tab || 'Thread');
    crumb.appendChild(crumbTab);
    header.appendChild(crumb);

    var titleEl = document.createElement('div');
    titleEl.className = 'thread-title';
    titleEl.textContent = thread.post_title || 'Untitled Thread';
    header.appendChild(titleEl);

    var metaEl = document.createElement('div');
    metaEl.className = 'thread-meta';

    var statusBadge = document.createElement('span');
    statusBadge.className = 'thread-status ' + (thread.status === 'open' ? 'status-open' : 'status-closed');
    statusBadge.textContent = thread.status || 'open';
    metaEl.appendChild(statusBadge);

    var partEl = document.createElement('span');
    partEl.className = 'thread-participants';
    var agentSpan = document.createElement('span');
    agentSpan.className = 'participant-agent';
    agentSpan.textContent = thread.agent_name || 'Agent';
    var posterSpan = document.createElement('span');
    posterSpan.className = 'participant-poster';
    posterSpan.textContent = thread.poster_name || 'Poster';
    partEl.appendChild(agentSpan);
    partEl.appendChild(document.createTextNode(' \u00B7 '));
    partEl.appendChild(posterSpan);
    metaEl.appendChild(partEl);

    header.appendChild(metaEl);
    appEl.appendChild(header);

    // Connection indicator
    var connEl = document.createElement('div');
    connEl.className = 'conn-indicator';
    connEl.id = 'conn-indicator';
    var dot = document.createElement('span');
    dot.className = 'conn-dot';
    var connLabel = document.createElement('span');
    connLabel.id = 'conn-label';
    connLabel.textContent = 'Connecting';
    connEl.appendChild(dot);
    connEl.appendChild(connLabel);
    appEl.appendChild(connEl);
    updateConnIndicator();

    // Messages area
    var msgsWrap = document.createElement('div');
    msgsWrap.className = 'messages-wrap';
    msgsWrap.id = 'messages-wrap';
    var msgList = document.createElement('div');
    msgList.className = 'msg-list';
    msgList.id = 'msg-list';
    msgsWrap.appendChild(msgList);
    appEl.appendChild(msgsWrap);

    renderMessages();

    // Input bar
    var inputBar = document.createElement('div');
    inputBar.className = 'input-bar';
    inputBar.id = 'input-bar';

    if (thread.status === 'open') {
      var inner = document.createElement('div');
      inner.className = 'input-inner';

      var textarea = document.createElement('textarea');
      textarea.className = 'input-textarea';
      textarea.id = 'msg-input';
      textarea.placeholder = 'Type a message\u2026';
      textarea.rows = 1;
      textarea.addEventListener('input', autoGrow);
      textarea.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      var sendBtn = document.createElement('button');
      sendBtn.className = 'send-btn';
      sendBtn.id = 'send-btn';
      sendBtn.textContent = 'Send';
      sendBtn.addEventListener('click', sendMessage);

      inner.appendChild(textarea);
      inner.appendChild(sendBtn);
      inputBar.appendChild(inner);
    } else {
      var notice = document.createElement('div');
      notice.className = 'closed-notice';
      notice.textContent = 'This thread has been closed.';
      inputBar.appendChild(notice);
    }

    appEl.appendChild(inputBar);

    // Scroll to bottom
    scrollToBottom();
  }

  // ── Render messages ──────────────────────────────────────────────────────
  function renderMessages() {
    var listEl = document.getElementById('msg-list');
    if (!listEl) return;
    clearEl(listEl);

    if (messages.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'msg-empty';
      var emptyIcon = document.createElement('div');
      emptyIcon.className = 'msg-empty-icon';
      emptyIcon.textContent = '\uD83D\uDCAC';
      var emptyP = document.createElement('p');
      emptyP.textContent = 'No messages yet. Start the conversation.';
      var emptySub = document.createElement('div');
      emptySub.className = 'sub';
      emptySub.textContent = 'Messages are end-to-end between you and the other participant.';
      empty.appendChild(emptyIcon);
      empty.appendChild(emptyP);
      empty.appendChild(emptySub);
      listEl.appendChild(empty);
      return;
    }

    var lastDate = '';
    for (var i = 0; i < messages.length; i++) {
      var msg = messages[i];

      // Date separator
      var msgDate = formatDate(msg.created_at);
      if (msgDate !== lastDate) {
        lastDate = msgDate;
        var sep = document.createElement('div');
        sep.className = 'date-sep';
        var line1 = document.createElement('div');
        line1.className = 'date-sep-line';
        var dateText = document.createElement('span');
        dateText.className = 'date-sep-text';
        dateText.textContent = msgDate;
        var line2 = document.createElement('div');
        line2.className = 'date-sep-line';
        sep.appendChild(line1);
        sep.appendChild(dateText);
        sep.appendChild(line2);
        listEl.appendChild(sep);
      }

      var row = document.createElement('div');
      row.className = 'msg-row ' + (msg.sender_type === 'agent' ? 'from-agent' : 'from-poster');
      row.setAttribute('data-msg-id', msg.msg_id || '');

      var sender = document.createElement('div');
      sender.className = 'msg-sender';
      sender.textContent = msg.sender_name || msg.sender_type;

      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = msg.text || '';

      var time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = formatTime(msg.created_at);

      row.appendChild(sender);
      row.appendChild(bubble);
      row.appendChild(time);
      listEl.appendChild(row);

      if (msg.msg_id) lastMsgId = msg.msg_id;
    }
  }

  // ── Append a single message (live update) ────────────────────────────────
  function appendMessage(msg) {
    // Deduplicate
    for (var i = 0; i < messages.length; i++) {
      if (messages[i].msg_id === msg.msg_id) return;
    }
    messages.push(msg);

    var listEl = document.getElementById('msg-list');
    if (!listEl) return;

    // Remove empty state if present
    var emptyEl = listEl.querySelector('.msg-empty');
    if (emptyEl) listEl.removeChild(emptyEl);

    // Date separator check
    var msgDate = formatDate(msg.created_at);
    var lastDate = '';
    if (messages.length > 1) {
      lastDate = formatDate(messages[messages.length - 2].created_at);
    }
    if (msgDate !== lastDate) {
      var sep = document.createElement('div');
      sep.className = 'date-sep';
      var line1 = document.createElement('div');
      line1.className = 'date-sep-line';
      var dateText = document.createElement('span');
      dateText.className = 'date-sep-text';
      dateText.textContent = msgDate;
      var line2 = document.createElement('div');
      line2.className = 'date-sep-line';
      sep.appendChild(line1);
      sep.appendChild(dateText);
      sep.appendChild(line2);
      listEl.appendChild(sep);
    }

    var row = document.createElement('div');
    row.className = 'msg-row ' + (msg.sender_type === 'agent' ? 'from-agent' : 'from-poster');
    row.setAttribute('data-msg-id', msg.msg_id || '');

    var sender = document.createElement('div');
    sender.className = 'msg-sender';
    sender.textContent = msg.sender_name || msg.sender_type;

    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = msg.text || '';

    var time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = formatTime(msg.created_at);

    row.appendChild(sender);
    row.appendChild(bubble);
    row.appendChild(time);
    listEl.appendChild(row);

    if (msg.msg_id) lastMsgId = msg.msg_id;
    scrollToBottom();
  }

  // ── Send message ─────────────────────────────────────────────────────────
  function sendMessage() {
    if (sending) return;
    var input = document.getElementById('msg-input');
    if (!input) return;
    var text = input.value.trim();
    if (!text) return;

    sending = true;
    var sendBtn = document.getElementById('send-btn');
    if (sendBtn) sendBtn.disabled = true;
    if (input) input.disabled = true;

    var body = { text: text };
    if (authMode === 'magic') body.magic = magicToken;

    fetch('/api/kassa/threads/' + encodeURIComponent(threadId) + '/messages', {
      method: 'POST',
      headers: apiHeaders(),
      body: JSON.stringify(body),
    })
    .then(function (r) {
      if (!r.ok) return r.json().then(function (d) { throw new Error(d.detail || 'Send failed'); });
      return r.json();
    })
    .then(function (data) {
      input.value = '';
      input.style.height = 'auto';
      // If not on WS, add optimistic message
      if (connState !== 'live') {
        pollMessages();
      }
    })
    .catch(function (err) {
      console.error('Send error:', err);
    })
    .finally(function () {
      sending = false;
      if (sendBtn) sendBtn.disabled = false;
      if (input) { input.disabled = false; input.focus(); }
    });
  }

  // ── WebSocket ────────────────────────────────────────────────────────────
  function connectWS() {
    var proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    var wsUrl = proto + '//' + window.location.host + '/ws';

    try {
      ws = new WebSocket(wsUrl);
    } catch (e) {
      fallbackToPoll();
      return;
    }

    ws.onopen = function () {
      setConnState('live');
      // Stop polling if it was running
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    };

    ws.onmessage = function (ev) {
      try {
        var data = JSON.parse(ev.data);
        if (data.type === 'kassa_thread_message' && data.payload) {
          var payload = data.payload;
          if (payload.thread_id === threadId && payload.msg) {
            appendMessage(payload.msg);
          }
        }
      } catch (e) { /* ignore parse errors */ }
    };

    ws.onclose = function () {
      ws = null;
      fallbackToPoll();
    };

    ws.onerror = function () {
      if (ws) { try { ws.close(); } catch (e) {} }
      ws = null;
      fallbackToPoll();
    };
  }

  function fallbackToPoll() {
    setConnState('poll');
    if (!pollTimer) {
      pollTimer = setInterval(pollMessages, 5000);
    }
  }

  function pollMessages() {
    fetch(apiUrl('/api/kassa/threads/' + encodeURIComponent(threadId) + '/messages'), {
      headers: apiHeaders(),
    })
    .then(function (r) {
      if (!r.ok) throw new Error('Poll failed');
      return r.json();
    })
    .then(function (data) {
      if (!Array.isArray(data)) return;
      // Find new messages
      var existingIds = {};
      for (var i = 0; i < messages.length; i++) {
        existingIds[messages[i].msg_id] = true;
      }
      var hasNew = false;
      for (var j = 0; j < data.length; j++) {
        if (!existingIds[data[j].msg_id]) {
          appendMessage(data[j]);
          hasNew = true;
        }
      }
    })
    .catch(function () { /* silent fail on poll */ });
  }

  // ── Connection state UI ──────────────────────────────────────────────────
  function setConnState(state) {
    connState = state;
    updateConnIndicator();
  }

  function updateConnIndicator() {
    var el = document.getElementById('conn-indicator');
    var label = document.getElementById('conn-label');
    if (!el || !label) return;

    el.className = 'conn-indicator';
    if (connState === 'live') {
      el.classList.add('conn-live');
      label.textContent = 'Live';
    } else if (connState === 'poll') {
      el.classList.add('conn-poll');
      label.textContent = 'Polling';
    } else {
      el.classList.add('conn-off');
      label.textContent = 'Offline';
    }
  }

  // ── Helpers ──────────────────────────────────────────────────────────────
  function clearEl(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  function scrollToBottom() {
    var wrap = document.getElementById('messages-wrap');
    if (wrap) {
      requestAnimationFrame(function () { wrap.scrollTop = wrap.scrollHeight; });
    }
  }

  function autoGrow() {
    this.style.height = 'auto';
    var max = 140;
    this.style.height = Math.min(this.scrollHeight, max) + 'px';
  }

  function formatDate(iso) {
    if (!iso) return '';
    try {
      var d = new Date(iso);
      var now = new Date();
      var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      var msgDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      var diff = today.getTime() - msgDay.getTime();
      var dayMs = 86400000;
      if (diff === 0) return 'Today';
      if (diff === dayMs) return 'Yesterday';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    } catch (e) { return ''; }
  }

  function formatTime(iso) {
    if (!iso) return '';
    try {
      var d = new Date(iso);
      return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    } catch (e) { return ''; }
  }

  // ── Boot ─────────────────────────────────────────────────────────────────
  function boot() {
    parseRoute();

    if (!threadId) {
      renderError('Thread Not Found', 'This thread doesn\'t exist or the link has expired.');
      return;
    }

    if (!authMode) {
      renderError('Authentication Required', 'Invalid or expired link. Contact the agent for a new link.');
      return;
    }

    renderLoading();

    // Fetch thread details
    fetch(apiUrl('/api/kassa/threads/' + encodeURIComponent(threadId)), {
      headers: apiHeaders(),
    })
    .then(function (r) {
      if (r.status === 404) {
        throw { code: 404, msg: 'This thread doesn\'t exist or the link has expired.' };
      }
      if (r.status === 403) {
        throw { code: 403, msg: 'Invalid or expired link. Contact the agent for a new link.' };
      }
      if (r.status === 401) {
        throw { code: 401, msg: 'Invalid or expired link. Contact the agent for a new link.' };
      }
      if (!r.ok) {
        throw { code: r.status, msg: 'Something went wrong loading this thread.' };
      }
      return r.json();
    })
    .then(function (data) {
      thread = data;
      document.title = (thread.post_title || 'Thread') + ' \u2014 CIVITAE KA\u00A7\u00A7A';

      // Fetch messages
      return fetch(apiUrl('/api/kassa/threads/' + encodeURIComponent(threadId) + '/messages'), {
        headers: apiHeaders(),
      });
    })
    .then(function (r) {
      if (!r.ok) return [];
      return r.json();
    })
    .then(function (data) {
      messages = Array.isArray(data) ? data : [];
      renderThread();
      connectWS();
    })
    .catch(function (err) {
      if (err && err.code) {
        if (err.code === 404) {
          renderError('Thread Not Found', err.msg);
        } else if (err.code === 403 || err.code === 401) {
          renderError('Access Denied', err.msg);
        } else {
          renderError('Error', err.msg);
        }
      } else {
        renderError('Connection Error', 'Could not reach the server. Check your connection and try again.');
      }
    });
  }

  // ── Start ────────────────────────────────────────────────────────────────
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }

}());
</script>
</body>
</html>
