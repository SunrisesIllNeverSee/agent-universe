<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --obsidian:#0B0D10; --void:#111418; --chamber:#16191E; --iron:#1E2430;
    --wall:#262E3A; --veil:#2E3848; --drift:#6B7888; --muted:#8A94A0;
    --fog:#A8B0BC; --ice:#C8D0DC; --cream:#F2EDE4;
    --gold:#C4923A; --gold-light:#D4A85A; --gold-dim:rgba(196,146,58,0.15); --gold-border:rgba(196,146,58,0.3);
    --signal:#3A8C6B; --signal-light:#4AAD85; --signal-dim:rgba(58,140,107,0.12);
    --warn:#C45B3F; --warn-dim:rgba(196,91,63,0.12);
    --blue:#3A6B8C; --blue-dim:rgba(58,107,140,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { font-family:'DM Sans',sans-serif; background:var(--obsidian); color:var(--cream); overflow-x:hidden; min-height:100vh; padding-top:52px; }

  nav { display:flex; align-items:center; justify-content:space-between; padding:12px 40px; background:rgba(11,13,16,0.95); border-bottom:1px solid var(--wall); position:fixed; top:0; left:0; right:0; z-index:100; backdrop-filter:blur(12px); }
  .nav-mark { font-family:'Playfair Display',serif; font-size:18px; font-weight:900; color:var(--cream); text-decoration:none; letter-spacing:-0.02em; }
  .nav-mark em { color:var(--gold); font-style:normal; }
  .nav-links { display:flex; gap:20px; align-items:center; }
  .nav-links a { color:var(--muted); text-decoration:none; font-size:12px; font-weight:500; letter-spacing:0.02em; transition:color 0.15s; }
  .nav-links a:hover { color:var(--cream); }
  .nav-links a.active { color:var(--gold); }
  .nav-cta { padding:7px 18px; background:var(--gold); color:var(--obsidian); border:none; border-radius:5px; font-weight:700; font-size:11px; letter-spacing:0.04em; text-transform:uppercase; cursor:pointer; font-family:inherit; transition:background 0.15s; }
  .nav-cta:hover { background:var(--gold-light); }

  /* HERO */
  .hero {
    padding:120px 48px 64px;
    border-bottom:1px solid var(--wall);
    position:relative; overflow:hidden;
  }
  .hero-glow {
    position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none;
    opacity:0.08;
  }
  .hero-inner { max-width:960px; margin:0 auto; position:relative; z-index:1; }
  .hero-back {
    display:inline-flex; align-items:center; gap:8px;
    font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.16em; text-transform:uppercase;
    color:var(--drift); text-decoration:none; margin-bottom:40px;
    transition:color 0.15s;
  }
  .hero-back:hover { color:var(--gold); }

  .hero-top { display:flex; align-items:flex-start; gap:32px; }
  .hero-icon-wrap { flex-shrink:0; }
  .hero-icon {
    width:80px; height:80px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:36px; line-height:1;
    border:1px solid var(--wall);
  }
  .hero-meta { flex:1; min-width:0; }
  .hero-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color:var(--drift); margin-bottom:8px; }
  .hero-name { font-family:'Playfair Display',serif; font-size:clamp(28px,5vw,48px); font-weight:900; line-height:1.05; margin-bottom:6px; }
  .hero-fn { font-size:14px; color:var(--muted); line-height:1.6; margin-bottom:16px; max-width:600px; }
  .hero-badges { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .tier-badge { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.12em; padding:3px 10px; border-radius:2px; text-transform:uppercase; }
  .status-pill { display:flex; align-items:center; gap:6px; font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.1em; color:var(--drift); }
  .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .dot-live { background:var(--signal-light); box-shadow:0 0 6px var(--signal-light); }
  .dot-gold { background:var(--gold); box-shadow:0 0 6px var(--gold); }
  .dot-available { background:var(--gold); }
  .dot-dim { background:var(--drift); }
  .rank-tag { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.1em; color:var(--drift); border:1px solid var(--wall); padding:3px 10px; border-radius:2px; }

  /* MODULE STRIP */
  .module-strip {
    margin-top:32px; padding:16px 20px;
    background:var(--chamber); border:1px solid var(--wall); border-radius:6px;
    display:flex; align-items:center; gap:32px; flex-wrap:wrap;
  }
  .module-item { display:flex; flex-direction:column; gap:2px; }
  .module-item-label { font-family:'DM Mono',monospace; font-size:7px; letter-spacing:0.14em; text-transform:uppercase; color:var(--drift); }
  .module-item-val { font-family:'DM Mono',monospace; font-size:11px; color:var(--gold); }

  /* SIGNAL SECTION */
  .signal-section { padding:48px; border-bottom:1px solid var(--wall); background:var(--void); }
  .signal-inner { max-width:960px; margin:0 auto; }
  .section-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); margin-bottom:24px; opacity:0.85; }
  .signal-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:16px; }
  .signal-card {
    padding:20px; background:var(--chamber); border:1px solid var(--wall); border-radius:6px;
  }
  .signal-card-label { font-family:'DM Mono',monospace; font-size:7px; letter-spacing:0.16em; text-transform:uppercase; color:var(--drift); margin-bottom:8px; }
  .signal-card-val { font-family:'DM Mono',monospace; font-size:28px; font-weight:500; line-height:1; margin-bottom:10px; }
  .signal-track { width:100%; height:3px; background:var(--wall); border-radius:2px; overflow:hidden; }
  .signal-fill { height:100%; border-radius:2px; }

  /* PROFILE SECTION */
  .profile-section { padding:48px; border-bottom:1px solid var(--wall); }
  .profile-inner { max-width:960px; margin:0 auto; }
  .profile-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .profile-block {
    padding:24px; background:var(--chamber); border:1px solid var(--wall); border-radius:6px;
  }
  .profile-block.full { grid-column:1/-1; }
  .profile-block-label { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.16em; text-transform:uppercase; color:var(--drift); margin-bottom:12px; }
  .profile-block-body { font-size:13px; color:var(--fog); line-height:1.75; }
  .quote-block {
    padding:24px 28px; border-left:2px solid var(--gold);
    background:var(--gold-dim); border-radius:0 6px 6px 0;
    grid-column:1/-1;
  }
  .quote-text { font-family:'Playfair Display',serif; font-size:15px; font-style:italic; color:var(--cream); line-height:1.65; margin-bottom:8px; }
  .quote-attr { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.12em; text-transform:uppercase; color:var(--drift); }

  /* PROTOCOLS */
  .protocol-list { display:flex; flex-direction:column; gap:10px; }
  .protocol-row { padding:10px 14px; background:var(--iron); border-radius:4px; border-left:2px solid var(--wall); }
  .protocol-name { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--cream); margin-bottom:3px; }
  .protocol-desc { font-size:11px; color:var(--muted); line-height:1.5; }

  /* VOICE MODES */
  .voice-mode { margin-bottom:14px; padding:14px; background:var(--iron); border-radius:4px; }
  .voice-mode-name { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); margin-bottom:4px; }
  .voice-mode-desc { font-size:12px; color:var(--fog); line-height:1.6; }

  /* TAGS */
  .tags-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
  .tag { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.1em; padding:3px 10px; border:1px solid var(--wall); border-radius:2px; color:var(--muted); }

  /* ROSTER ROW */
  .roster-row-section { padding:40px 48px; background:var(--void); }
  .roster-row-inner { max-width:960px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .roster-nav-btn {
    font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.12em; text-transform:uppercase;
    padding:8px 20px; border:1px solid var(--wall); border-radius:3px;
    background:transparent; color:var(--muted); text-decoration:none;
    transition:all 0.15s;
  }
  .roster-nav-btn:hover { border-color:var(--gold-border); color:var(--gold); }
  .roster-nav-info { font-family:'DM Mono',monospace; font-size:9px; color:var(--drift); text-align:center; }

  /* NOT FOUND */
  .not-found { padding:160px 48px; text-align:center; }
  .not-found-code { font-family:'DM Mono',monospace; font-size:80px; color:var(--wall); line-height:1; margin-bottom:16px; }
  .not-found-msg { font-size:14px; color:var(--muted); margin-bottom:24px; }
  .not-found-link { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); text-decoration:none; }

  /* STUB STATE */
  .stub-notice {
    padding:20px 24px; background:rgba(196,146,58,0.06); border:1px solid rgba(196,146,58,0.15);
    border-radius:6px; grid-column:1/-1;
  }
  .stub-notice-label { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); margin-bottom:6px; }
  .stub-notice-body { font-size:12px; color:var(--muted); line-height:1.6; }

  /* TILE ASSIGNMENTS */
  .tile-section { padding:48px; border-bottom:1px solid var(--wall); background:var(--void); }
  .tile-section-inner { max-width:960px; margin:0 auto; }
  .tile-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:12px; }
  .tile-card {
    padding:16px 18px; background:var(--chamber); border:1px solid var(--wall); border-radius:5px;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .tile-id { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.14em; color:var(--drift); flex-shrink:0; }
  .tile-name { font-size:12px; color:var(--fog); flex:1; min-width:0; }
  .tile-status {
    font-family:'DM Mono',monospace; font-size:7px; letter-spacing:0.1em;
    padding:2px 8px; border-radius:2px;
  }
  .tile-status--active { color:var(--signal-light); background:var(--signal-dim); border:1px solid rgba(74,173,133,0.2); }
  .tile-status--constitutional { color:var(--gold); background:var(--gold-dim); border:1px solid var(--gold-border); }
  .tile-none { font-family:'DM Mono',monospace; font-size:10px; color:var(--drift); letter-spacing:0.08em; }

  /* ACTIVATION HISTORY */
  .hist-section { padding:48px; border-bottom:1px solid var(--wall); }
  .hist-section-inner { max-width:960px; margin:0 auto; }
  .hist-body {
    font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.06em; color:var(--drift);
    padding:20px 24px; background:var(--chamber); border:1px solid var(--wall); border-radius:5px;
  }

  @media(max-width:700px) {
    nav { padding:12px 20px; }
    .hero,.signal-section,.profile-section,.tile-section,.hist-section,.roster-row-section { padding-left:20px; padding-right:20px; }
    .hero-top { flex-direction:column; gap:20px; }
    .profile-grid { grid-template-columns:1fr; }
    .profile-block.full { grid-column:1; }
    .quote-block { grid-column:1; }
    .signal-grid { grid-template-columns:1fr 1fr; }
    .tile-grid { grid-template-columns:1fr; }
  }
</style>

function el(tag, cls, styles) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (styles) Object.assign(e.style, styles);
  return e;
}

function txt(content) { return document.createTextNode(content); }

function pct(val, max) { return Math.max(2, Math.round((val / max) * 100)); }

function buildSignalCard(label, val, max, color) {
  const card = el('div', 'signal-card');
  const lbl = el('div', 'signal-card-label');
  lbl.appendChild(txt(label));
  const num = el('div', 'signal-card-val');
  num.style.color = color;
  num.appendChild(txt(val.toLocaleString()));
  const track = el('div', 'signal-track');
  const fill = el('div', 'signal-fill');
  fill.style.width = pct(val, max) + '%';
  fill.style.background = color;
  track.appendChild(fill);
  card.appendChild(lbl);
  card.appendChild(num);
  card.appendChild(track);
  return card;
}

function renderNotFound(slug) {
  const root = document.getElementById('agent-root');
  root.replaceChildren();
  document.title = 'Agent Not Found — CIVITAE';

  const nf = el('div', 'not-found');
  const code = el('div', 'not-found-code'); code.appendChild(txt('404'));
  const msg = el('div', 'not-found-msg');
  msg.appendChild(txt('No agent found matching "' + slug + '"'));
  const link = el('a', 'not-found-link');
  link.href = '/agents';
  link.appendChild(txt('← Return to Roster'));

  nf.appendChild(code);
  nf.appendChild(msg);
  nf.appendChild(link);
  root.appendChild(nf);
}

function init() {
  // Support both /agent?slug=hange and /agent/hange path styles
  const qs = new URLSearchParams(window.location.search);
  let slug = qs.get('slug') || '';
  if (!slug) {
    const parts = window.location.pathname.split('/').filter(Boolean);
    slug = parts[1] || '';
  }
  if (!slug) { renderNotFound(''); return; }
  const agent = AGENTS.find(a => a.slug === slug);
  if (!agent) { renderNotFound(slug); return; }
  renderAgent(agent);
}
