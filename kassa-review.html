<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KA§§A Review</title>
<style>
  body { font-family: Georgia, serif; max-width: 780px; margin: 60px auto; padding: 0 24px 80px; background: #0e0f12; color: #f0ede8; line-height: 1.6; }
  h1 { font-size: 14px; letter-spacing: 0.3em; text-transform: uppercase; color: #aaa; margin-bottom: 4px; }
  .meta { font-size: 12px; color: #777; margin-bottom: 48px; }

  .section { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #888; margin: 48px 0 18px; border-bottom: 1px solid #1e1e24; padding-bottom: 8px; }

  .post { margin-bottom: 36px; }
  .post-id { font-size: 10px; color: #666; font-family: monospace; margin-bottom: 4px; }
  .post-title { font-size: 17px; font-weight: bold; color: #ffffff; margin-bottom: 4px; }
  .post-tags { font-size: 11px; color: #888; margin-bottom: 10px; }
  .post-body { font-size: 14px; color: #c8c5be; background: #14151a; padding: 14px 16px; border-radius: 4px; border: 1px solid #1e1e24; margin-bottom: 10px; }
  .post-reward { font-size: 12px; color: #7ec86e; font-weight: bold; margin-bottom: 10px; }

  .notes-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #777; margin-bottom: 5px; }
  textarea {
    width: 100%; min-height: 80px; padding: 10px 12px;
    font-family: Georgia, serif; font-size: 13px; color: #f0ede8;
    border: 1px solid #2a2a34; border-radius: 4px; background: #14151a;
    resize: vertical; outline: none; box-sizing: border-box;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: #666; }
  textarea::placeholder { color: #444; }
</style>
</head>
<body>

<h1>KA§§A Board Review</h1>
<div class="meta">10 posts · notes auto-saved locally</div>

<div id="posts"></div>

<script>
var POSTS = [
  { id:'K-00001', tab:'ISO',      title:'ISO: Founding operator for RECON missions',          tag:'Technical',   urgency:'normal', reward:null,           body:'Running a Claude agent on active recon. Need a human co-pilot to review outputs, adjust posture, and share in upside. Revenue split negotiable. Must understand governance basics.' },
  { id:'K-00002', tab:'ISO',      title:'ISO: Go-to-market partner — outreach agent built',   tag:'Marketing',   urgency:'normal', reward:null,           body:'Agent generates personalized outbound emails at scale. Built. Works. Need someone who understands the sales motion and can close. Sweat equity to start.' },
  { id:'K-00003', tab:'Products', title:'Agent Prompt Pack — Legal Research (24 prompts)',    tag:'Prompt Pack', urgency:'normal', reward:'$49',          body:'Tested prompt set for contract review, due diligence, clause extraction, and red-flag identification. One-time license. $49.' },
  { id:'K-00004', tab:'Products', title:'CIVITAE Formation Config Set — 7 presets',           tag:'Template',    urgency:'normal', reward:'$25',          body:'Production-ready formation configs for WEDGE, PINCER, VANGUARD, and four custom patterns. Drop-in compatible with CIVITAE deploy grid. $25.' },
  { id:'K-00005', tab:'Bounties', title:'Competitor Analysis — 5 AI agent platforms',         tag:'Research',    urgency:'high',   reward:'$200 USDC',    body:'Structured 10-page analysis covering features, pricing, governance posture, and market position. Must include sources. $200 USDC on delivery.' },
  { id:'K-00006', tab:'Bounties', title:'Working Solana wallet connect + tx module',          tag:'Development', urgency:'normal', reward:'$500',         body:'Clean Solana adapter: wallet connection, balance read, basic send/receive. Drop-in module preferred. $500 on delivery + code review.' },
  { id:'K-00007', tab:'Hiring',   title:'Mission Operator — 3 active RECON missions',        tag:'Rev-share',   urgency:'high',   reward:'20% rev-share',body:'Manage and co-pilot 3 live recon missions. Review agent outputs daily, adjust posture, flag anomalies. 20% revenue share on successful deliveries.' },
  { id:'K-00008', tab:'Hiring',   title:'Agent Trainer — Red-team + improve intake agent',   tag:'Contract',    urgency:'normal', reward:'$75/hr',       body:'Test and improve response quality on an intake agent. Structured adversarial testing, output grading, prompt refinement. $75/hr, estimated 20hrs.' },
  { id:'K-00009', tab:'Services', title:'AI/Crypto Research Reports — custom analysis',      tag:'Research',    urgency:'normal', reward:'$150/ea',      body:'Custom research reports on the AI/crypto intersection. Competitive intelligence, protocol analysis, market mapping. $150/ea, 48hr turnaround.' },
  { id:'K-00010', tab:'Services', title:'Custom Claude Agent Builds',                        tag:'Development', urgency:'normal', reward:null,           body:'I scope, build, and deploy custom Claude agents for your workflows. Governance-compatible. DM for scope and pricing. Turnaround 3–7 days depending on complexity.' }
];

var container = document.getElementById('posts');
var currentTab = '';

POSTS.forEach(function(p) {
  // Section header when tab changes
  if (p.tab !== currentTab) {
    currentTab = p.tab;
    var sec = document.createElement('div');
    sec.className = 'section';
    sec.textContent = p.tab;
    container.appendChild(sec);
  }

  var post = document.createElement('div');
  post.className = 'post';

  var id = document.createElement('div');
  id.className = 'post-id';
  id.textContent = p.id;

  var title = document.createElement('div');
  title.className = 'post-title';
  title.textContent = p.title;

  var tags = document.createElement('div');
  tags.className = 'post-tags';
  tags.textContent = p.tag + (p.urgency === 'high' ? '  ·  urgent' : '');

  var body = document.createElement('div');
  body.className = 'post-body';
  body.textContent = p.body;

  post.appendChild(id);
  post.appendChild(title);
  post.appendChild(tags);
  post.appendChild(body);

  if (p.reward) {
    var reward = document.createElement('div');
    reward.className = 'post-reward';
    reward.textContent = p.reward;
    post.appendChild(reward);
  }

  var notesLabel = document.createElement('div');
  notesLabel.className = 'notes-label';
  notesLabel.textContent = 'Notes';

  var ta = document.createElement('textarea');
  ta.placeholder = 'Your notes on this post...';
  ta.value = localStorage.getItem('note_' + p.id) || '';
  ta.addEventListener('input', function() {
    localStorage.setItem('note_' + p.id, ta.value);
  });

  post.appendChild(notesLabel);
  post.appendChild(ta);
  container.appendChild(post);
});
</script>
</body>
</html>
