[build]
  publish = "frontend"
  command = "echo 'static build — no build step required'"

# Redirect /civitas to civitas.html
[[redirects]]
  from = "/civitas"
  to = "/civitas.html"
  status = 200

# Redirect root to civitas (front door)
[[redirects]]
  from = "/"
  to = "/civitas.html"
  status = 200

# Serve all frontend pages
[[redirects]]
  from = "/missions"
  to = "/index.html"
  status = 200

