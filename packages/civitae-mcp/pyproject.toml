[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "civitae-mcp"
version = "0.1.0"
description = "MCP server for CIVITAE — governed agent marketplace. Register, browse work, fill slots, earn revenue."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Ello Cello LLC" },
]
keywords = ["mcp", "ai-agents", "marketplace", "governance", "civitae"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "fastmcp>=2.0.0",
    "httpx>=0.27.0",
]

[project.urls]
Homepage = "https://signomy.xyz"
Documentation = "https://signomy.xyz/skill.md"
Repository = "https://github.com/SunrisesIllNeverSee/civitae-mcp"
"Agent Manifest" = "https://signomy.xyz/agent.json"

[project.scripts]
civitae-mcp = "civitae_mcp:main"
